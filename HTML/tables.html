<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tables</title>
</head>

<body>
    <h1>Tables in HTMl</h1>

    <table border="1">
        <tr>
            <th>Roll No.</th>
            <th>Name</th>
            <th>Class</th>
        </tr>
        <tr>
            <td>1</td>
            <td>Aman</td>
            <td><img width="100" src="image/1.png" alt="screenshot"></td>
        </tr>
        <tr>
            <td>2</td>
            <td>rohit</td>
            <td>10</td>
        </tr>
        <tr>
            <td>3</td>
            <td>Krishna</td>
            <td>11</td>
        </tr>
        <tr>
            <td>4</td>
            <td>Shantanu</td>
            <td>12</td>
        </tr>
    </table>
    <table border="1">
        <tr>
            <th>Roll No.</th>
            <th>Name</th>
            <th>Class</th>
        </tr>
        <tr>
            <td>1</td>
            <td rowspan="2">Aman</td>
            <td><img src="image/1.png" alt="screenshot"></td>
        </tr>
        <tr>
            <td>2</td>
            <td>rohit</td>
            <td>10</td>
        </tr>
        <tr >
            <td>3</td>
            <td colspan="2">Krishna</td>
            <td>11</td>
        </tr>
        <tr>
            <td>4</td>
            <td>Shantanu</td>
            <td>12</td>
        </tr>
    </table>
</body>

</html>
