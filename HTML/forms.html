<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forms</title>
</head>
<body>
    <h1>College Form</h1>
    <form action="/manage.py">
        <label for="name">Name:</label>
        <input type="text" id="name" placeholder="Your Full Name..."><br><br>

        <label for="email">E-mail:</label>
        <input type="email" id="email" placeholder="Your E-mail..."><br><br>

        <label for="pass">Password</label>
        <input type="password" id="pass" placeholder="Enter Password..."><br><br>

        <label for="cpass">Confirm Password:</label>
        <input type="password" id="cpass" placeholder="Enter Confirm Password..."><br><br>

        <label for="phone">Phone</label>
        <input type="tel" id="phone" placeholder="Your Mobile Number..."><br><br>

        <input type="submit">
    </form>
</body>
</html>
